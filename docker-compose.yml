services:
  # 1. The Database (Postgres 15)
  db:
    image: postgres:15-alpine
    container_name: remotedays-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: remote_days
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: Auto-run SQL scripts on first boot
      - ./docker/postgres:/docker-entrypoint-initdb.d
    networks:
      - remotedays-network

  # 2. The Backend (Node API)
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: remotedays-api
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/remote_days
      PORT: 3000
      JWT_SECRET: "dev-secret-do-not-use-in-prod"
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_FROM: "no-reply@remotedays.local"
    depends_on:
      - db
      - mailpit
    networks:
      - remotedays-network

  # 3. The Frontend (React)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: remotedays-web
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/node_modules
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_PROXY_TARGET: "http://api:3000"
    networks:
      - remotedays-network

  # 4. Email Catching (Mailpit)
  mailpit:
    image: axllent/mailpit
    container_name: remotedays-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - remotedays-network

  # 5. pgAdmin (Database GUI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: remotedays-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@remotedays.app
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./docker/pgadmin/pgpass:/pgadmin4/pgpass:ro
    depends_on:
      - db
    networks:
      - remotedays-network

  # 6. Seeding (Run once on startup)
  seed:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: remotedays-seed
    # Override the default command to run the demo seed script (100 users)
    command: [ "npm", "run", "db:seed:demo", "--workspace=apps/api" ]
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/remote_days
      JWT_SECRET: "dev-secret-do-not-use-in-prod"
    depends_on:
      db:
        condition: service_started
      api:
        condition: service_started
    networks:
      - remotedays-network
    # Only run this profile if specifically requested or if we want it to run every time 'up' is called without arguments?
    # User said "so that it will work in the launch".
    # Defaulting to standard execution, but it will exit after completion.

volumes:
  postgres_data:
  pgadmin_data:


networks:
  remotedays-network:
    driver: bridge
