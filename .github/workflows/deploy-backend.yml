name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/types/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Build & Deploy to EC2
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.remotedays.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --project apps/api/tsconfig.json --noEmit

      - name: Build API
        run: npm run build --workspace=@remotedays/api

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp apps/api/dist/server.js deploy/
          node -e "
            const fs = require('fs');
            const pkg = require('./apps/api/package.json');
            delete pkg.devDependencies;
            delete pkg.scripts;
            pkg.scripts = { start: 'node server.js' };
            fs.writeFileSync('deploy/package.json', JSON.stringify(pkg, null, 2));
          "
          cp ecosystem.config.js deploy/
          tar -czf deploy.tar.gz -C deploy .

      - name: Copy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: deploy.tar.gz
          target: /home/ec2-user/remote-days

      - name: Deploy and restart
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DATABASE_URL,JWT_SECRET,APP_URL,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,EMAIL_FROM
          script: |
            set -e
            cd /home/ec2-user/remote-days

            # Backup current version
            if [ -f server.js ]; then
              mkdir -p /home/ec2-user/backups
              BACKUP_DIR="/home/ec2-user/backups/$(date +%Y%m%d-%H%M%S)"
              mkdir -p "$BACKUP_DIR"
              cp -r *.js package*.json "$BACKUP_DIR"/ 2>/dev/null || true
            fi

            # Extract new version
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            # Generate .env
            cat > .env << EOF
            DATABASE_URL=${DATABASE_URL}
            JWT_SECRET=${JWT_SECRET}
            APP_URL=${APP_URL}
            NODE_ENV=production
            PORT=3000
            SMTP_HOST=${SMTP_HOST}
            SMTP_PORT=${SMTP_PORT}
            SMTP_USER=${SMTP_USER}
            SMTP_PASS=${SMTP_PASS}
            EMAIL_FROM=${EMAIL_FROM}
            EOF

            # Install dependencies
            npm install --production --no-progress --quiet --no-audit

            # Restart
            pm2 startOrRestart ecosystem.config.js
            pm2 save

            # Cleanup old backups (keep 5)
            ls -dt /home/ec2-user/backups/* 2>/dev/null | tail -n +6 | xargs -r rm -rf

            echo "Deployment complete!"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sleep 5
            for i in {1..5}; do
              if curl -sf http://localhost:3000/ > /dev/null; then
                echo "Health check passed!"
                exit 0
              fi
              echo "Attempt $i/5 failed, retrying..."
              sleep 2
            done
            echo "Health check failed"
            pm2 logs remotedays-api --lines 30
            exit 1

      - name: Summary
        run: |
          echo "## Backend Deployed" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://api.remotedays.app" >> $GITHUB_STEP_SUMMARY
