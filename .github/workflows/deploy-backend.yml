name: Deploy Backend

on:
  push:
    branches: [ "main" ]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "scripts/prepare-ec2.sh"
      - "package.json"
      - ".github/workflows/deploy-backend.yml"

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create Build Artifacts
        run: |
          # Use our standard preparation script to build apps/api
          bash scripts/prepare-ec2.sh
          
          # Add root ecosystem config to the staging area
          cp ecosystem.config.js deploy/
          
          # Create .env file from Secret (to populate ~/tracker/.env on server)
          echo "${{ secrets.ENV_FILE }}" > deploy/.env
          
          # Compress deploy/ folder contents
          # Result: artifact.tar.gz containing 'tracker-api/' folder, 'ecosystem.config.js', and '.env'
          tar -czf artifact.tar.gz -C deploy .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-artifact
          path: artifact.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-artifact

      - name: Copy Files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "artifact.tar.gz"
          target: "/home/${{ secrets.EC2_USER }}/tracker"

      - name: Execute Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_ROOT="/home/${{ secrets.EC2_USER }}/tracker"
            STANDALONE_DIR="$APP_ROOT/api-standalone"
            
            echo "📂 Setting up deployment directories..."
            mkdir -p $APP_ROOT
            mkdir -p $STANDALONE_DIR
            
            cd $APP_ROOT
            
            # Extract Artifacts
            echo "📦 Extracting new version..."
            if [ -f "artifact.tar.gz" ]; then
              tar -xzf artifact.tar.gz
              rm artifact.tar.gz
            else
              echo "❌ Error: artifact.tar.gz not found!"
              exit 1
            fi
            
            # At this point we have 'tracker-api/' folder, 'ecosystem.config.js', and '.env' in root
            
            # Update .env (vital for robust config loading)
            if [ -f ".env" ]; then
                echo "🔑 Updating .env..."
                # No-op if it's already there, but ensures it exists
            fi
            
            # Update Standalone App Directory
            echo "🚀 Updating application files..."
            # Remove old version contents but keep directory
            rm -rf $STANDALONE_DIR/*
            # Copy new contents
            cp -r tracker-api/* $STANDALONE_DIR/
            rm -rf tracker-api
            
            # Install Production Dependencies
            echo "📥 Installing dependencies..."
            cd $STANDALONE_DIR
            npm install --production --no-progress --quiet --no-audit
            
            # Restart Application
            echo "🔄 Restarting PM2..."
            cd $APP_ROOT
            pm2 startOrRestart ecosystem.config.js
            pm2 save
            
            echo "✅ Remote Deployment Complete!"
