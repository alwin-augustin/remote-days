name: Deploy Backend

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_DIR: /home/ec2-user/remote-days

jobs:
  # ===========================================
  # Deploy to Production
  # ===========================================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    # Only deploy if CI succeeded (or manual trigger)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: production
      url: https://api.remotedays.app

    steps:
      - name: Download API artifact from CI
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: ci.yml
          name: api-artifact
          run_id: ${{ github.event.workflow_run.id }}
          if_no_artifact_found: fail

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: api-artifact.tar.gz
          target: /home/ec2-user/remote-days

      - name: Deploy and restart
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DATABASE_URL,JWT_SECRET,APP_URL,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,EMAIL_FROM
          script: |
            set -e
            APP_DIR="/home/ec2-user/remote-days"
            BACKUP_DIR="/home/ec2-user/backups/remote-days-$(date +%Y%m%d-%H%M%S)"

            echo "Setting up directories..."
            mkdir -p "$APP_DIR"
            mkdir -p "/home/ec2-user/backups"
            cd "$APP_DIR"

            # Backup current version for rollback
            if [ -f "$APP_DIR/server.js" ]; then
              echo "Creating backup..."
              mkdir -p "$BACKUP_DIR"
              cp -r "$APP_DIR"/*.js "$APP_DIR"/package*.json "$BACKUP_DIR"/ 2>/dev/null || true
            fi

            # Extract new version
            echo "Extracting new version..."
            if [ -f "api-artifact.tar.gz" ]; then
              tar -xzf api-artifact.tar.gz
              rm api-artifact.tar.gz
            else
              echo "Error: api-artifact.tar.gz not found!"
              exit 1
            fi

            # Generate .env file from GitHub secrets
            echo "Generating .env file..."
            cat > .env << EOF
            DATABASE_URL=${DATABASE_URL}
            JWT_SECRET=${JWT_SECRET}
            APP_URL=${APP_URL}
            NODE_ENV=production
            PORT=3000
            SMTP_HOST=${SMTP_HOST}
            SMTP_PORT=${SMTP_PORT}
            SMTP_USER=${SMTP_USER}
            SMTP_PASS=${SMTP_PASS}
            EMAIL_FROM=${EMAIL_FROM}
            EOF

            # Install production dependencies
            echo "Installing dependencies..."
            npm install --production --no-progress --quiet --no-audit

            # Restart with PM2
            echo "Restarting application..."
            pm2 startOrRestart ecosystem.config.js
            pm2 save

            # Clean old backups (keep last 5)
            echo "Cleaning old backups..."
            ls -dt /home/ec2-user/backups/remote-days-* 2>/dev/null | tail -n +6 | xargs -r rm -rf

            echo "Deployment complete!"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "Waiting for application to start..."
            sleep 5

            # Check PM2 status
            if ! pm2 show remotedays-api | grep -q "online"; then
              echo "Error: Application not running!"
              pm2 logs remotedays-api --lines 50
              exit 1
            fi

            # Health check endpoint
            for i in {1..5}; do
              if curl -sf http://localhost:3000/ > /dev/null; then
                echo "Health check passed!"
                exit 0
              fi
              echo "Attempt $i/5 failed, retrying..."
              sleep 2
            done

            echo "Health check failed after 5 attempts"
            pm2 logs remotedays-api --lines 50
            exit 1

      - name: Deployment summary
        run: |
          echo "## Backend Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**API URL:** https://api.remotedays.app" >> $GITHUB_STEP_SUMMARY
          echo "**Swagger:** https://api.remotedays.app/documentation" >> $GITHUB_STEP_SUMMARY
