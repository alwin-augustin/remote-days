name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/types/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  APP_DIR: /home/ec2-user/remote-days

jobs:
  # ===========================================
  # Build & Test
  # ===========================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --project apps/api/tsconfig.json --noEmit

      - name: Run tests
        run: npm run test --workspace=@remotedays/api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          JWT_SECRET: test-secret-key-for-ci-min-32-chars
          NODE_ENV: test

      - name: Build API
        run: npm run build --workspace=@remotedays/api

      - name: Create deployment artifacts
        run: |
          mkdir -p deploy

          # Copy built server
          cp apps/api/dist/server.js deploy/

          # Create production package.json (without devDependencies)
          node -e "
            const fs = require('fs');
            const pkg = require('./apps/api/package.json');
            delete pkg.devDependencies;
            delete pkg.scripts;
            pkg.scripts = { start: 'node server.js' };
            fs.writeFileSync('deploy/package.json', JSON.stringify(pkg, null, 2));
          "

          # Copy ecosystem config
          cp ecosystem.config.js deploy/

          # Create tarball
          tar -czf artifact.tar.gz -C deploy .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-artifact
          path: artifact.tar.gz
          retention-days: 7

  # ===========================================
  # Deploy to Production
  # ===========================================
  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.remotedays.app

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-artifact

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: artifact.tar.gz
          target: /home/ec2-user/remote-days

      - name: Deploy and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_DIR="/home/ec2-user/remote-days"
            BACKUP_DIR="/home/ec2-user/backups/remote-days-$(date +%Y%m%d-%H%M%S)"

            echo "Setting up directories..."
            mkdir -p "$APP_DIR"
            mkdir -p "/home/ec2-user/backups"
            cd "$APP_DIR"

            # Backup current version for rollback
            if [ -f "$APP_DIR/server.js" ]; then
              echo "Creating backup..."
              mkdir -p "$BACKUP_DIR"
              cp -r "$APP_DIR"/*.js "$APP_DIR"/package*.json "$BACKUP_DIR"/ 2>/dev/null || true
            fi

            # Extract new version
            echo "Extracting new version..."
            if [ -f "artifact.tar.gz" ]; then
              tar -xzf artifact.tar.gz
              rm artifact.tar.gz
            else
              echo "Error: artifact.tar.gz not found!"
              exit 1
            fi

            # Install production dependencies
            echo "Installing dependencies..."
            npm install --production --no-progress --quiet --no-audit

            # Restart with PM2
            echo "Restarting application..."
            pm2 startOrRestart ecosystem.config.js
            pm2 save

            # Clean old backups (keep last 5)
            echo "Cleaning old backups..."
            ls -dt /home/ec2-user/backups/remote-days-* 2>/dev/null | tail -n +6 | xargs -r rm -rf

            echo "Deployment complete!"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "Waiting for application to start..."
            sleep 5

            # Check PM2 status
            if ! pm2 show remotedays-api | grep -q "online"; then
              echo "Error: Application not running!"
              pm2 logs remotedays-api --lines 50
              exit 1
            fi

            # Health check endpoint
            for i in {1..5}; do
              if curl -sf http://localhost:3000/ > /dev/null; then
                echo "Health check passed!"
                exit 0
              fi
              echo "Attempt $i/5 failed, retrying..."
              sleep 2
            done

            echo "Health check failed after 5 attempts"
            pm2 logs remotedays-api --lines 50
            exit 1

      - name: Deployment summary
        run: |
          echo "## Backend Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**API URL:** https://api.remotedays.app" >> $GITHUB_STEP_SUMMARY
          echo "**Swagger:** https://api.remotedays.app/documentation" >> $GITHUB_STEP_SUMMARY
