name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Force deploy backend'
        type: boolean
        default: false
      deploy_frontend:
        description: 'Force deploy frontend'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ===========================================
  # CI: Lint & Type Check (runs on all pushes and PRs)
  # ===========================================
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check API
        run: npx tsc --project apps/api/tsconfig.json --noEmit

      - name: Type check Web
        run: npx tsc --project apps/web/tsconfig.json --noEmit

      - name: Lint Web
        run: npm run lint --workspace=@remotedays/web --if-present

  # ===========================================
  # Detect what changed (only on push to main)
  # ===========================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      landing: ${{ steps.filter.outputs.landing }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/api/**'
              - 'packages/types/**'
              - 'packages/shared/**'
            frontend:
              - 'apps/web/**'
              - 'packages/types/**'
              - 'packages/shared/**'
            landing:
              - 'landing/**'
            mobile:
              - 'apps/mobile/**'
              - 'packages/types/**'
              - 'packages/shared/**'

  # ===========================================
  # Deploy Backend to EC2
  # ===========================================
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [ci, changes]
    if: |
      always() &&
      needs.ci.result == 'success' &&
      (needs.changes.outputs.backend == 'true' || github.event.inputs.deploy_backend == 'true')
    environment:
      name: production
      url: https://api.remotedays.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build API
        run: npm run build --workspace=@remotedays/api

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp apps/api/dist/server.js deploy/
          node -e "
            const fs = require('fs');
            const pkg = require('./apps/api/package.json');
            delete pkg.devDependencies;
            delete pkg.scripts;
            pkg.scripts = { start: 'node server.js' };
            fs.writeFileSync('deploy/package.json', JSON.stringify(pkg, null, 2));
          "
          cp ecosystem.config.js deploy/
          tar -czf deploy.tar.gz -C deploy .

      - name: Copy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: deploy.tar.gz
          target: /home/ec2-user/remote-days

      - name: Deploy and restart
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          DAILY_EMAIL_LIMIT: ${{ secrets.DAILY_EMAIL_LIMIT }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DATABASE_URL,JWT_SECRET,APP_URL,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,EMAIL_FROM,DAILY_EMAIL_LIMIT
          script: |
            set -e
            cd /home/ec2-user/remote-days
            mkdir -p logs

            # Backup current version
            if [ -f server.js ]; then
              mkdir -p /home/ec2-user/backups
              BACKUP_DIR="/home/ec2-user/backups/$(date +%Y%m%d-%H%M%S)"
              mkdir -p "$BACKUP_DIR"
              cp -r *.js package*.json "$BACKUP_DIR"/ 2>/dev/null || true
            fi

            # Extract new version
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            # Generate .env
            cat > .env << EOF
            DATABASE_URL=${DATABASE_URL}
            JWT_SECRET=${JWT_SECRET}
            APP_URL=${APP_URL}
            NODE_ENV=production
            PORT=3000
            SMTP_HOST=${SMTP_HOST}
            SMTP_PORT=${SMTP_PORT}
            SMTP_USER=${SMTP_USER}
            SMTP_PASS=${SMTP_PASS}
            EMAIL_FROM=${EMAIL_FROM}
            DAILY_EMAIL_LIMIT=${DAILY_EMAIL_LIMIT}
            EOF

            # Install dependencies
            npm install --production --no-progress --quiet --no-audit

            # Restart
            pm2 startOrRestart ecosystem.config.js
            pm2 save

            # Cleanup old backups (keep 5)
            ls -dt /home/ec2-user/backups/* 2>/dev/null | tail -n +6 | xargs -r rm -rf

            echo "Deployment complete!"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sleep 5
            for i in {1..5}; do
              if curl -sf http://localhost:3000/ > /dev/null; then
                echo "Health check passed!"
                exit 0
              fi
              echo "Attempt $i/5 failed, retrying..."
              sleep 2
            done
            echo "Health check failed"
            pm2 logs remotedays-api --lines 30
            exit 1

  # ===========================================
  # Deploy Frontend to Vercel
  # ===========================================
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [ci, changes]
    if: |
      always() &&
      needs.ci.result == 'success' &&
      (needs.changes.outputs.frontend == 'true' || github.event.inputs.deploy_frontend == 'true')
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Build Web App
        run: npm run build --workspace=@remotedays/web
        env:
          VITE_API_URL: https://api.remotedays.app

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
        working-directory: apps/web

  # ===========================================
  # Deploy Landing Page to Vercel
  # ===========================================
  deploy-landing:
    name: Deploy Landing
    runs-on: ubuntu-latest
    needs: [ci, changes]
    if: |
      always() &&
      needs.ci.result == 'success' &&
      needs.changes.outputs.landing == 'true'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_LANDING }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT

  # ===========================================
  # Summary
  # ===========================================
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [ci, changes, deploy-backend, deploy-frontend, deploy-landing]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Generate Summary
        env:
          CI_RESULT: ${{ needs.ci.result }}
          BACKEND_RESULT: ${{ needs.deploy-backend.result }}
          FRONTEND_RESULT: ${{ needs.deploy-frontend.result }}
          LANDING_RESULT: ${{ needs.deploy-landing.result }}
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "$CI_RESULT" = "success" ]; then
            echo "| CI | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| CI | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$BACKEND_RESULT" = "success" ]; then
            echo "| Backend | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          elif [ "$BACKEND_RESULT" = "skipped" ]; then
            echo "| Backend | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Backend | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$FRONTEND_RESULT" = "success" ]; then
            echo "| Frontend | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          elif [ "$FRONTEND_RESULT" = "skipped" ]; then
            echo "| Frontend | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Frontend | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$LANDING_RESULT" = "success" ]; then
            echo "| Landing | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          elif [ "$LANDING_RESULT" = "skipped" ]; then
            echo "| Landing | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Landing | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
