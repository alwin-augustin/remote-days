name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ===========================================
  # Lint and Type Check
  # ===========================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check API
        run: npx tsc --project apps/api/tsconfig.json --noEmit

      - name: Type check Web
        run: npx tsc --project apps/web/tsconfig.json --noEmit

      - name: Lint Web
        run: npm run lint --workspace=@remotedays/web --if-present

  # ===========================================
  # Build All Applications
  # ===========================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build API
        run: npm run build --workspace=@remotedays/api

      - name: Build Web
        run: npm run build --workspace=@remotedays/web
        env:
          VITE_API_URL: https://api.remotedays.app

      - name: Create API deployment package
        run: |
          mkdir -p deploy-api
          cp apps/api/dist/server.js deploy-api/
          node -e "
            const fs = require('fs');
            const pkg = require('./apps/api/package.json');
            delete pkg.devDependencies;
            delete pkg.scripts;
            pkg.scripts = { start: 'node server.js' };
            fs.writeFileSync('deploy-api/package.json', JSON.stringify(pkg, null, 2));
          "
          cp ecosystem.config.js deploy-api/
          tar -czf api-artifact.tar.gz -C deploy-api .

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-artifact
          path: api-artifact.tar.gz
          retention-days: 7

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-artifact
          path: apps/web/dist/
          retention-days: 7
